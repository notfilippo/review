<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Review</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="importmap">
      {
        "imports": {
          "@pierre/diffs": "https://esm.sh/@pierre/diffs@1.2.11",
          "@pierre/diffs/worker": "https://esm.sh/@pierre/diffs@1.2.11/worker",
          "@pierre/trees": "https://esm.sh/@pierre/trees@1.0.0-beta.4",
          "lucide": "https://esm.sh/lucide@0.468.0"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <button id="tree-toggle" class="icon-button" type="button" aria-pressed="false" aria-label="Show file tree" title="Show file tree"></button>
          <strong>Review</strong>
          <span id="status">Loading</span>
        </div>
        <div class="actions">
          <button id="search-toggle" class="icon-button" type="button" aria-pressed="false" aria-label="Search diff" title="Search diff"></button>
          <button id="layout-toggle" class="icon-button" type="button" aria-label="Switch to unified diff" title="Switch to unified diff"></button>
          <button id="collapse-toggle" class="icon-button" type="button" aria-label="Collapse all files" title="Collapse all files"></button>
          <button id="done" class="icon-button primary" type="button" aria-label="Finish review" title="Finish review"></button>
        </div>
      </header>
      <div id="code-search" class="code-search" role="search" data-open="false">
        <input id="search-input" class="search-input" type="search" placeholder="Search" autocomplete="off" spellcheck="false" aria-label="Search diff">
        <span id="search-count" class="search-count" aria-live="polite"></span>
        <button id="search-prev" class="icon-button search-nav" type="button" aria-label="Previous search result" title="Previous search result"></button>
        <button id="search-next" class="icon-button search-nav" type="button" aria-label="Next search result" title="Next search result"></button>
        <button id="search-close" class="icon-button search-nav" type="button" aria-label="Close search" title="Close search"></button>
      </div>
      <main class="workspace">
        <div id="tree-backdrop" class="tree-backdrop" aria-hidden="true"></div>
        <aside class="sidebar">
          <div class="sidebar-tabs" role="tablist" aria-label="Sidebar views">
            <button id="files-tab" class="sidebar-tab" type="button" role="tab" aria-selected="true" aria-controls="tree">Files</button>
            <button id="comments-tab" class="sidebar-tab" type="button" role="tab" aria-selected="false" aria-controls="comment-nav">
              <span>Comments</span>
              <span id="comment-nav-summary" class="tab-count">0</span>
            </button>
          </div>
          <div id="tree" class="tree sidebar-tab-panel" role="tabpanel" aria-labelledby="files-tab"></div>
          <div id="comment-nav" class="comment-nav sidebar-tab-panel" role="tabpanel" aria-labelledby="comments-tab" hidden></div>
          <div class="sidebar-panels">
            <details class="sidebar-pane" open>
              <summary>
                <span class="pane-title">
                  <span class="pane-chevron" aria-hidden="true"></span>
                  <span>Diff stats</span>
                </span>
                <span id="diff-stats-summary" class="pane-summary"></span>
              </summary>
              <div id="diff-stats" class="diff-stats"></div>
            </details>
          </div>
          <div id="sidebar-resizer" class="sidebar-resizer" role="separator" aria-label="Resize file tree" aria-orientation="vertical" tabindex="0"></div>
        </aside>
        <section class="review">
          <div id="diff" class="diff">
            <div class="diff-loading" role="status" aria-live="polite">
              <span class="diff-loading-spinner" aria-hidden="true"></span>
              <span>Loading review</span>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
